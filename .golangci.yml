run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - copyloopvar
    - unconvert
    - unparam
    - nilerr
    - errorlint
    - prealloc
    - whitespace

linters-settings:
  goimports:
    local-prefixes: github.com/ricardocabral/icuvisor
  revive:
    rules:
      - name: exported
        arguments: ["disableStutteringCheck"]
  gosec:
    excludes:
      - G104 # handled by errcheck/errorlint

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
  max-issues-per-linter: 0
  max-same-issues: 0
