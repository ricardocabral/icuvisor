  label: Activities
- key: workout-library
  label: Workout library
- key: events
  label: Events & calendar
- key: fitness
  label: Fitness metrics
- key: analyzers
  label: Analyzers
- key: wellness
  label: Wellness
- key: custom-items
  label: Custom items
- key: settings
  label: Sport settings
- key: coach
  label: Coach mode
- key: meta
  label: Server
