# Shared by the landing-page tool list (layouts/partials/tool-list.html) and the
# generated tool reference (layouts/partials/tool-catalog.html) so both pages
# present the same topic hierarchy. `key` matches the `group` field emitted into
# web/data/tools.json by `make docs-tools`; `label` is the display heading.
